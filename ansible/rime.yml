# could just drop gtk support

- hosts: localhost
  connection: local
  vars:
    dotfiles_dir: "{{ playbook_dir | dirname }}"
    user_home: "{{ lookup('env', 'HOME') }}"

  tasks:
    - name: Gather installed packages
      package_facts:
        manager: auto

    - name: Install fcitx5 and rime core (Debian/Ubuntu)
      become: true
      apt:
        name:
          - fcitx5
          - fcitx5-rime
          - fcitx5-chinese-addons
          - librime1
          - rime-data-luna-pinyin
          - rime-essay
          - rime-prelude
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Install fcitx5 Qt5 frontend (Debian/Ubuntu)
      become: true
      apt:
        name: fcitx5-frontend-qt5
        state: present
      when:
        - ansible_facts['os_family'] == "Debian"
        - "'libqt5core5a' in ansible_facts['packages']"

    - name: Install fcitx5 Qt6 frontend (Debian/Ubuntu)
      become: true
      apt:
        name: fcitx5-frontend-qt6
        state: present
      when:
        - ansible_facts['os_family'] == "Debian"
        - "'libqt6core6' in ansible_facts['packages']"

    - name: Install fcitx5 GTK3 frontend (Debian/Ubuntu)
      become: true
      apt:
        name: fcitx5-frontend-gtk3
        state: present
      when:
        - ansible_facts['os_family'] == "Debian"
        - "'libgtk-3-0' in ansible_facts['packages']"

    - name: Install fcitx5 GTK4 frontend (Debian/Ubuntu)
      become: true
      apt:
        name: fcitx5-frontend-gtk4
        state: present
      when:
        - ansible_facts['os_family'] == "Debian"
        - "'libgtk-4-1' in ansible_facts['packages']"

    - name: Install fcitx5 and rime core (Arch)
      become: true
      pacman:
        name:
          - fcitx5
          - fcitx5-rime
          - fcitx5-chinese-addons
          - rime-luna-pinyin
        state: present
      when: ansible_facts['os_family'] == "Archlinux"

    - name: Install fcitx5 Qt frontend (Arch)
      become: true
      pacman:
        name: fcitx5-qt
        state: present
      when:
        - ansible_facts['os_family'] == "Archlinux"
        - "'qt5-base' in ansible_facts['packages'] or 'qt6-base' in ansible_facts['packages']"

    - name: Install fcitx5 GTK frontend (Arch)
      become: true
      pacman:
        name: fcitx5-gtk
        state: present
      when:
        - ansible_facts['os_family'] == "Archlinux"
        - "'gtk3' in ansible_facts['packages'] or 'gtk4' in ansible_facts['packages']"

    - name: Install fcitx5 and rime core (Fedora/RHEL)
      become: true
      dnf:
        name:
          - fcitx5
          - fcitx5-rime
          - fcitx5-chinese-addons
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install fcitx5 Qt frontend (Fedora/RHEL)
      become: true
      dnf:
        name: fcitx5-qt
        state: present
      when:
        - ansible_facts['os_family'] == "RedHat"
        - "'qt5-qtbase' in ansible_facts['packages'] or 'qt6-qtbase' in ansible_facts['packages']"

    - name: Install fcitx5 GTK3 frontend (Fedora/RHEL)
      become: true
      dnf:
        name: fcitx5-gtk3
        state: present
      when:
        - ansible_facts['os_family'] == "RedHat"
        - "'gtk3' in ansible_facts['packages']"

    - name: Install fcitx5 GTK4 frontend (Fedora/RHEL)
      become: true
      dnf:
        name: fcitx5-gtk4
        state: present
      when:
        - ansible_facts['os_family'] == "RedHat"
        - "'gtk4' in ansible_facts['packages']"

    - name: Create fcitx5 config directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ user_home }}/.config/fcitx5/conf"
        - "{{ user_home }}/.local/share/fcitx5/rime"
        - "{{ user_home }}/.config/environment.d"
      when: ansible_facts['os_family'] != "Darwin"

    - name: Copy fcitx5 config files
      copy:
        src: "{{ dotfiles_dir }}/{{ item.src }}"
        dest: "{{ user_home }}/{{ item.dest }}"
        mode: "0644"
        force: false
      loop:
        - { src: "config/fcitx5/config",                        dest: ".config/fcitx5/config" }
        - { src: "config/fcitx5/profile",                       dest: ".config/fcitx5/profile" }
        - { src: "config/fcitx5/conf/rime.conf",                dest: ".config/fcitx5/conf/rime.conf" }
        - { src: "local/share/fcitx5/rime/default.custom.yaml", dest: ".local/share/fcitx5/rime/default.custom.yaml" }
      when: ansible_facts['os_family'] != "Darwin"

    - name: Restore Rime user dictionary
      copy:
        src: "{{ dotfiles_dir }}/local/share/fcitx5/rime/luna_pinyin.userdb/"
        dest: "{{ user_home }}/.local/share/fcitx5/rime/luna_pinyin.userdb/"
        mode: "0644"
        force: false
      when: ansible_facts['os_family'] != "Darwin"

    # XMODIFIERS only — GTK_IM_MODULE/QT_IM_MODULE omitted so Wayland-native apps use the Wayland IM protocol directly
    - name: Set fcitx5 IM environment variables for sandboxed/XWayland apps
      copy:
        src: "{{ dotfiles_dir }}/config/environment.d/fcitx5.conf"
        dest: "{{ user_home }}/.config/environment.d/fcitx5.conf"
        mode: "0644"
      when: ansible_facts['os_family'] != "Darwin"

    - name: Check if WeChat is installed
      shell: >
        find /usr/share/applications "{{ user_home }}/.local/share/applications"
        \( -name '*wechat*' -o -name '*weixin*' \) -print -quit 2>/dev/null
      register: wechat_desktop
      changed_when: false
      failed_when: false

    - name: Read installed WeChat icon path
      shell: "grep -m1 '^Icon=' '{{ wechat_desktop.stdout }}' | cut -d= -f2-"
      register: wechat_icon
      changed_when: false
      failed_when: false
      when: wechat_desktop.stdout != ""

    - name: Ensure ~/.local/share/applications exists
      file:
        path: "{{ user_home }}/.local/share/applications"
        state: directory
        mode: "0755"
      when:
        - ansible_facts['os_family'] != "Darwin"
        - wechat_desktop.stdout != ""

    - name: Deploy WeChat desktop override for fcitx5 XWayland IM
      template:
        src: "{{ dotfiles_dir }}/local/share/applications/wechat.desktop.j2"
        dest: "{{ user_home }}/.local/share/applications/wechat.desktop"
        mode: "0644"
      when:
        - ansible_facts['os_family'] != "Darwin"
        - wechat_desktop.stdout != ""

    - name: Set fcitx5 as KDE Wayland virtual keyboard
      command: kwriteconfig6 --file kwinrc --group Wayland --key InputMethod /usr/share/applications/fcitx5-wayland-launcher.desktop
      changed_when: false
      when:
        - ansible_facts['os_family'] != "Darwin"
        - lookup('env', 'XDG_CURRENT_DESKTOP') == 'KDE'

    # for non-KDE/non-systemd X11 sessions
    - name: Write fcitx5 environment variables for X11 sessions
      copy:
        dest: "{{ user_home }}/.xprofile"
        content: |
          export GTK_IM_MODULE=fcitx
          export QT_IM_MODULE=fcitx
          export XMODIFIERS=@im=fcitx
        mode: "0644"
        force: false
      when: ansible_facts['os_family'] != "Darwin"
