- name: Add Google Chrome repo
  ansible.builtin.yum_repository:
    name: google-chrome
    description: Google Chrome
    baseurl: https://dl.google.com/linux/chrome/rpm/stable/x86_64
    gpgkey: https://dl.google.com/linux/linux_signing_key.pub
    gpgcheck: true
    enabled: true
  become: true

- name: Add VS Code repo
  ansible.builtin.yum_repository:
    name: vscode
    description: Visual Studio Code
    baseurl: https://packages.microsoft.com/yumrepos/vscode
    gpgkey: https://packages.microsoft.com/keys/microsoft.asc
    gpgcheck: true
    enabled: true
  become: true

- name: Add GitHub CLI repo
  ansible.builtin.yum_repository:
    name: gh-cli
    description: packages for the GitHub CLI
    baseurl: https://cli.github.com/packages/rpm
    gpgkey: https://cli.github.com/packages/githubcli-archive-keyring.asc
    gpgcheck: true
    enabled: true
  become: true

- name: Install Chrome, VS Code, and CLI tools
  ansible.builtin.dnf:
    name: [google-chrome-stable, code, gh, sl, fastfetch, btop, gti, cowsay, wl-clipboard, awscli2]
    state: present
  become: true

- name: Check if Discord is installed
  command: rpm -q discord
  register: _discord_check
  changed_when: false
  failed_when: false

- name: Download Discord
  ansible.builtin.get_url:
    url: "https://discord.com/api/download?platform=linux&format=rpm"
    dest: /tmp/discord.rpm
    mode: '0644'
  when: _discord_check.rc != 0

- name: Install Discord
  ansible.builtin.dnf:
    name: /tmp/discord.rpm
    state: present
    disable_gpg_check: true
  become: true
  when: _discord_check.rc != 0

- name: Check if WeChat is installed
  command: rpm -q wechat
  register: _wechat_check
  changed_when: false
  failed_when: false

- name: Download WeChat
  ansible.builtin.get_url:
    url: "https://dldir1v6.qq.com/weixin/Universal/Linux/WeChatLinux_x86_64.rpm"
    dest: /tmp/wechat.rpm
    mode: '0644'
  when: _wechat_check.rc != 0

- name: Install WeChat
  ansible.builtin.dnf:
    name: /tmp/wechat.rpm
    state: present
    disable_gpg_check: true
  become: true
  when: _wechat_check.rc != 0
