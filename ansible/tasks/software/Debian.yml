- name: Add Google Chrome repo
  block:
    - name: Add Google signing key
      ansible.builtin.get_url:
        url: https://dl.google.com/linux/linux_signing_key.pub
        dest: /etc/apt/keyrings/google.asc
        mode: '0644'
    - name: Add Chrome apt repo
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/google.asc] https://dl.google.com/linux/chrome/deb/ stable main"
        filename: google-chrome
        state: present
  become: true

- name: Add VS Code repo
  block:
    - name: Add Microsoft signing key
      ansible.builtin.get_url:
        url: https://packages.microsoft.com/keys/microsoft.asc
        dest: /etc/apt/keyrings/microsoft.asc
        mode: '0644'
    - name: Add VS Code apt repo
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.asc] https://packages.microsoft.com/repos/code stable main"
        filename: vscode
        state: present
  become: true

- name: Install Chrome, VS Code, and CLI tools
  ansible.builtin.apt:
    name: [google-chrome-stable, code, sl, fastfetch, btop, gti, cowsay, wl-clipboard]
    state: present
    update_cache: true
  become: true

- name: Check if Discord is installed
  command: dpkg -s discord
  register: _discord_check
  changed_when: false
  failed_when: false

- name: Download Discord
  ansible.builtin.get_url:
    url: "https://discord.com/api/download?platform=linux&format=deb"
    dest: /tmp/discord.deb
    mode: '0644'
  when: _discord_check.rc != 0

- name: Install Discord
  ansible.builtin.apt:
    name: /tmp/discord.deb
    state: present
  become: true
  when: _discord_check.rc != 0
