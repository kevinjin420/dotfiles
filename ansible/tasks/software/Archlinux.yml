- name: Install base-devel and git for yay
  community.general.pacman:
    name: [base-devel, git]
    state: present
  become: true

- name: Check if yay is installed
  command: which yay
  register: _yay_check
  changed_when: false
  failed_when: false

- name: Install yay from AUR
  shell: |
    git clone https://aur.archlinux.org/yay.git /tmp/yay
    cd /tmp/yay
    makepkg -si --noconfirm
    rm -rf /tmp/yay
  when: _yay_check.rc != 0
  changed_when: true

- name: Install Chrome, VS Code, Discord, and CLI tools via yay
  shell: yay -S --noconfirm --needed google-chrome visual-studio-code-bin discord sl fastfetch btop gti cowsay
  changed_when: false
