- name: Install base-devel and git for yay
  community.general.pacman:
    name: [base-devel, git]
    state: present
  become: true

- name: Check if yay is installed
  command: which yay
  register: _yay_check
  changed_when: false
  failed_when: false

- name: Bootstrap yay and install AUR/CLI tools
  block:
    - name: Prompt for sudo password
      ansible.builtin.pause:
        prompt: "Sudo password"
        echo: false
      register: _sudo_prompt
      no_log: true

    - name: Create temporary sudo askpass helper
      ansible.builtin.tempfile:
        state: file
        suffix: yay-askpass
      register: _yay_askpass

    - name: Write askpass helper script
      ansible.builtin.copy:
        dest: "{{ _yay_askpass.path }}"
        mode: "0700"
        content: |
          #!/bin/sh
          echo '{{ _sudo_prompt.user_input }}'
      no_log: true

    - name: Install yay from AUR
      shell: |
        git clone https://aur.archlinux.org/yay.git /tmp/yay
        cd /tmp/yay
        makepkg -si --noconfirm
        rm -rf /tmp/yay
      environment:
        SUDO_ASKPASS: "{{ _yay_askpass.path }}"
      when: _yay_check.rc != 0
      changed_when: true

    - name: Install Chrome, VS Code, Discord, WeChat, and CLI tools via yay
      shell: yay -S --noconfirm --needed google-chrome texlive-basic texlive-latexextra texlive-fontsrecommended visual-studio-code-bin discord wechat-bin wechat github-cli sl fastfetch btop gti cowsay wl-clipboard aws-cli-bin
      environment:
        SUDO_ASKPASS: "{{ _yay_askpass.path }}"
      changed_when: false
  always:
    - name: Remove askpass helper
      ansible.builtin.file:
        path: "{{ _yay_askpass.path }}"
        state: absent
      when: _yay_askpass is defined
