- hosts: localhost
  connection: local
  vars:
    user_home: "{{ lookup('env', 'HOME') }}"
    zsh_custom: "{{ user_home }}/.oh-my-zsh/custom"

  tasks:
    - name: Install zsh and fzf (macOS)
      community.general.homebrew:
        name: [zsh, fzf]
        state: present
      when: ansible_os_family == "Darwin"

    - name: Install zsh and fzf (Linux)
      package:
        name: [zsh, fzf]
        state: present
      become: true
      when: ansible_os_family != "Darwin"

    - name: Resolve zsh binary path
      command: which zsh
      register: zsh_which
      changed_when: false

    - name: Register zsh in /etc/shells
      lineinfile:
        path: /etc/shells
        line: "{{ zsh_which.stdout }}"
        state: present
      become: true
      when: ansible_os_family != "Darwin"

    - name: Set zsh as default shell
      user:
        name: "{{ lookup('env', 'USER') }}"
        shell: "{{ zsh_which.stdout }}"
      become: true

    - name: Install Oh-My-Zsh
      git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "{{ user_home }}/.oh-my-zsh"
        depth: 1
        update: false

    - name: Install ZSH plugins and themes
      git:
        repo: "{{ item.repo }}"
        dest: "{{ zsh_custom }}/{{ item.type }}/{{ item.name }}"
        depth: 1
        update: false
      loop:
        - { name: zsh-autosuggestions,    type: plugins, repo: 'https://github.com/zsh-users/zsh-autosuggestions' }
        - { name: zsh-syntax-highlighting, type: plugins, repo: 'https://github.com/zsh-users/zsh-syntax-highlighting' }
        - { name: powerlevel10k,           type: themes,  repo: 'https://github.com/romkatv/powerlevel10k' }
