- hosts: localhost
  connection: local
  vars:
    dotfiles_dir: "{{ playbook_dir | dirname }}"
    user_home: "{{ lookup('env', 'HOME') }}"
    kitty_bin_dir: "{{ user_home }}/.local/kitty.app/{{ 'Contents/MacOS' if ansible_facts['os_family'] == 'Darwin' else 'bin' }}"
  
  tasks:
    - name: Ensure basic utilities are installed
      package:
        name:
          - zsh
          - fzf
          - git
          - curl
          - neovim
          - python3
          - cowsay
          - sl
        state: present

    - name: Resolve zsh binary path
      command: which zsh
      register: zsh_which
      changed_when: false

    - name: Set zsh as default shell
      user:
        name: "{{ lookup('env', 'USER') }}"
        shell: "{{ zsh_which.stdout }}"
      become: true

    - name: Install Oh-My-Zsh
      git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "{{ user_home }}/.oh-my-zsh"
        depth: 1

    - name: Install ZSH plugins and themes
      git:
        repo: "{{ item.repo }}"
        dest: "{{ user_home }}/.oh-my-zsh/custom/{{ item.type }}/{{ item.name }}"
        depth: 1
      loop:
        - { name: 'zsh-autosuggestions', type: 'plugins', repo: 'https://github.com/zsh-users/zsh-autosuggestions' }
        - { name: 'zsh-syntax-highlighting', type: 'plugins', repo: 'https://github.com/zsh-users/zsh-syntax-highlighting' }
        - { name: 'powerlevel10k', type: 'themes', repo: 'https://github.com/romkatv/powerlevel10k' }

    - name: Get latest Kitty version
      uri:
        url: https://api.github.com/repos/kovidgoyal/kitty/releases/latest
      register: kitty_latest

    - name: Get installed Kitty version
      command: "{{ kitty_bin_dir }}/kitty --version"
      register: kitty_installed
      failed_when: false
      changed_when: false

    - name: Kitty version check
      debug:
        msg: >-
          latest={{ kitty_latest.json.tag_name | regex_replace('^v', '') }}
          installed={{ kitty_installed.stdout | default('not found') }}
          action={{ 'will install/upgrade' if (kitty_installed.rc != 0 or kitty_latest.json.tag_name | regex_replace('^v', '') not in kitty_installed.stdout) else 'already up to date' }}

    - name: Install or upgrade Kitty
      shell: curl -L https://sw.kovidgoyal.net/kitty/installer.sh | sh /dev/stdin dest={{ user_home }}/.local launch=n
      when: >
        kitty_installed.rc != 0 or
        kitty_latest.json.tag_name | regex_replace('^v', '') not in kitty_installed.stdout

    - name: Setup Kitty symlinks
      file:
        src: "{{ kitty_bin_dir }}/{{ item }}"
        dest: "{{ user_home }}/.local/bin/{{ item }}"
        state: link
      loop:
        - kitty
        - kitten

    - name: Create required directories
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ user_home }}/.config/kitty"

    - name: Create Linux application directories
      file:
        path: "{{ user_home }}/.local/share/applications"
        state: directory
      when: ansible_facts['os_family'] != "Darwin"

    - name: Install Kitty desktop files
      copy:
        src: "{{ user_home }}/.local/kitty.app/share/applications/{{ item }}"
        dest: "{{ user_home }}/.local/share/applications/{{ item }}"
        remote_src: true
      loop:
        - kitty.desktop
        - kitty-open.desktop
      when: ansible_facts['os_family'] != "Darwin"

    - name: Patch Kitty desktop Icon path
      replace:
        path: "{{ user_home }}/.local/share/applications/{{ item }}"
        regexp: '^Icon=kitty$'
        replace: "Icon={{ user_home }}/.local/kitty.app/share/icons/hicolor/256x256/apps/kitty.png"
      loop:
        - kitty.desktop
        - kitty-open.desktop
      when: ansible_facts['os_family'] != "Darwin"

    - name: Patch Kitty desktop Exec path
      replace:
        path: "{{ user_home }}/.local/share/applications/{{ item }}"
        regexp: '^Exec=kitty'
        replace: "Exec={{ user_home }}/.local/kitty.app/bin/kitty"
      loop:
        - kitty.desktop
        - kitty-open.desktop
      when: ansible_facts['os_family'] != "Darwin"

    - name: Register kitty as default terminal
      copy:
        content: "kitty.desktop\n"
        dest: "{{ user_home }}/.config/xdg-terminals.list"
      when: ansible_facts['os_family'] != "Darwin"

    - name: Setup LazyVim
      git:
        repo: https://github.com/LazyVim/starter
        dest: "{{ user_home }}/.config/nvim"
        update: false

    - name: Create symlinks for dotfiles
      file:
        src: "{{ dotfiles_dir }}/{{ item.src }}"
        dest: "{{ user_home }}/{{ item.dest }}"
        state: link
        force: yes
      loop:
        - { src: 'zshrc', dest: '.zshrc' }
        - { src: 'p10k.zsh', dest: '.p10k.zsh' }
        - { src: 'gitconfig', dest: '.gitconfig' }
        - { src: 'config/kitty/kitty.conf', dest: '.config/kitty/kitty.conf' }
