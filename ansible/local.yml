- hosts: localhost
  connection: local
  vars:
    dotfiles_dir: "{{ playbook_dir | dirname }}"
    user_home: "{{ lookup('env', 'HOME') }}"
    zsh_custom: "{{ user_home }}/.oh-my-zsh/custom"
    kitty_install_dir: "{{ (user_home + '/Applications') if ansible_facts['os_family'] == 'Darwin' else (user_home + '/.local') }}"
    kitty_app_dir: "{{ kitty_install_dir }}/kitty.app"
    kitty_bin_dir: "{{ kitty_app_dir }}/{{ 'Contents/MacOS' if ansible_facts['os_family'] == 'Darwin' else 'bin' }}"

  tasks:
    - name: Install base packages (macOS)
      community.general.homebrew:
        name: [zsh, fzf, git, curl, neovim, python3, cowsay, sl]
        state: present
      when: ansible_facts['os_family'] == "Darwin"

    - name: Install base packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name: [zsh, fzf, git, curl, neovim, python3, cowsay, sl]
        state: present
        update_cache: true
      become: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Install base packages (Arch)
      community.general.pacman:
        name: [zsh, fzf, git, curl, neovim, python3, cowsay, sl]
        state: present
      become: true
      when: ansible_facts['os_family'] == "Archlinux"

    - name: Install base packages (Fedora/RedHat)
      ansible.builtin.dnf:
        name: [zsh, fzf, git, curl, neovim, python3, cowsay, sl]
        state: present
      become: true
      when: ansible_facts['os_family'] == "RedHat"

    - name: Resolve zsh binary path
      command: which zsh
      register: zsh_which
      changed_when: false

    - name: Register zsh in /etc/shells
      lineinfile:
        path: /etc/shells
        line: "{{ zsh_which.stdout }}"
        state: present
      become: true

    - name: Set zsh as default shell
      command: chsh -s "{{ zsh_which.stdout }}" "{{ lookup('env', 'USER') }}"
      become: true
      changed_when: false

    - name: Check if Oh-My-Zsh is installed
      stat:
        path: "{{ user_home }}/.oh-my-zsh"
      register: omz_dir

    - name: Install Oh-My-Zsh
      git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "{{ user_home }}/.oh-my-zsh"
        depth: 1
        update: false
      when: not omz_dir.stat.exists

    - name: Install ZSH plugins and themes
      git:
        repo: "{{ item.repo }}"
        dest: "{{ zsh_custom }}/{{ item.type }}/{{ item.name }}"
        depth: 1
        update: false
      loop:
        - { name: zsh-autosuggestions, type: plugins, repo: 'https://github.com/zsh-users/zsh-autosuggestions' }
        - { name: zsh-syntax-highlighting, type: plugins, repo: 'https://github.com/zsh-users/zsh-syntax-highlighting' }
        - { name: powerlevel10k, type: themes,  repo: 'https://github.com/romkatv/powerlevel10k' }

    - name: Get latest Kitty version
      uri:
        url: https://api.github.com/repos/kovidgoyal/kitty/releases/latest
      register: kitty_latest

    - name: Get installed Kitty version
      command: "{{ kitty_bin_dir }}/kitty --version"
      register: kitty_installed
      failed_when: false
      changed_when: false

    - name: Kitty version check
      debug:
        msg: >-
          latest={{ kitty_latest.json.tag_name | regex_replace('^v', '') }}
          installed={{ kitty_installed.stdout | default('not found') }}
          action={{ 'will install/upgrade' if (kitty_installed.rc != 0 or kitty_latest.json.tag_name | regex_replace('^v', '') not in kitty_installed.stdout) else 'already up to date' }}

    - name: Install or upgrade Kitty
      shell: curl -L https://sw.kovidgoyal.net/kitty/installer.sh | sh /dev/stdin dest={{ kitty_install_dir }} launch=n
      when: >
        kitty_installed.rc != 0 or
        kitty_latest.json.tag_name | regex_replace('^v', '') not in kitty_installed.stdout

    - name: Ensure ~/.local/bin exists
      file:
        path: "{{ user_home }}/.local/bin"
        state: directory
        mode: '0755'

    - name: Setup Kitty symlinks
      file:
        src: "{{ kitty_bin_dir }}/{{ item }}"
        dest: "{{ user_home }}/.local/bin/{{ item }}"
        state: link
      loop:
        - kitty
        - kitten

    - name: Create required directories
      file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ user_home }}/.config/kitty"
        - "{{ user_home }}/.config/tmux"
        - "{{ user_home }}/Documents/wallpapers"

    - name: Copy wallpapers (no overwrite)
      copy:
        src: "{{ item }}"
        dest: "{{ user_home }}/Documents/wallpapers/"
        force: false
      with_fileglob:
        - "{{ dotfiles_dir }}/wallpapers/*"

    - name: Create Linux application directories
      file:
        path: "{{ user_home }}/.local/share/applications"
        state: directory
      when: ansible_facts['os_family'] != "Darwin"

    - name: Install Kitty desktop files
      copy:
        src: "{{ kitty_app_dir }}/share/applications/{{ item }}"
        dest: "{{ user_home }}/.local/share/applications/{{ item }}"
        remote_src: true
      loop:
        - kitty.desktop
        - kitty-open.desktop
      when: ansible_facts['os_family'] != "Darwin"

    - name: Patch Kitty desktop Icon path
      replace:
        path: "{{ user_home }}/.local/share/applications/{{ item }}"
        regexp: '^Icon=kitty$'
        replace: "Icon={{ kitty_app_dir }}/share/icons/hicolor/256x256/apps/kitty.png"
      loop:
        - kitty.desktop
        - kitty-open.desktop
      when: ansible_facts['os_family'] != "Darwin"

    - name: Patch Kitty desktop Exec path
      replace:
        path: "{{ user_home }}/.local/share/applications/{{ item }}"
        regexp: '^Exec=kitty'
        replace: "Exec={{ kitty_bin_dir }}/kitty"
      loop:
        - kitty.desktop
        - kitty-open.desktop
      when: ansible_facts['os_family'] != "Darwin"

    - name: Register kitty as default terminal
      copy:
        content: "kitty.desktop\n"
        dest: "{{ user_home }}/.config/xdg-terminals.list"
      when: ansible_facts['os_family'] != "Darwin"

    - name: Setup LazyVim
      git:
        repo: https://github.com/LazyVim/starter
        dest: "{{ user_home }}/.config/nvim"
        update: false

    - name: Install fonts (Linux)
      copy:
        src: "{{ item }}"
        dest: "/usr/share/fonts/"
      with_fileglob:
        - "{{ dotfiles_dir }}/fonts/*.ttf"
      become: true
      when: ansible_facts['os_family'] != "Darwin"
    - name: Rebuild font cache (Linux)
      command: fc-cache -f
      become: true
      changed_when: false
      when: ansible_facts['os_family'] != "Darwin"
    - name: Install fonts (macOS)
      copy:
        src: "{{ item }}"
        dest: "{{ user_home }}/Library/Fonts/"
      with_fileglob:
        - "{{ dotfiles_dir }}/fonts/*.ttf"
      when: ansible_facts['os_family'] == "Darwin"
    - name: Create symlinks for dotfiles
      file:
        src: "{{ dotfiles_dir }}/{{ item.src }}"
        dest: "{{ user_home }}/{{ item.dest }}"
        state: link
        force: yes
      loop:
        - { src: 'dots/zshrc', dest: '.zshrc' }
        - { src: 'dots/p10k.zsh', dest: '.p10k.zsh' }
        - { src: 'dots/gitconfig', dest: '.gitconfig' }
        - { src: 'dots/always_forget.md', dest: 'always-forget.md' }
        - { src: 'config/kitty/kitty.conf', dest: '.config/kitty/kitty.conf' }
        - { src: 'config/tmux/tmux.conf', dest: '.config/tmux/tmux.conf' }
