- hosts: localhost
  connection: local
  vars:
    dotfiles_dir: "{{ playbook_dir | dirname }}"
    user_home: "{{ lookup('env', 'HOME') }}"

  tasks:
    - name: Tap jurplel/tap for instant-space-switcher
      community.general.homebrew_tap:
        name: jurplel/tap
        state: present

    - name: Install instant-space-switcher
      community.general.homebrew_cask:
        name: jurplel/tap/instant-space-switcher
        state: present

    - name: Install rectangle (window snapping)
      community.general.homebrew_cask:
        name: rectangle
        state: present

    - name: Install hammerspoon (move-window-to-desktop gesture)
      community.general.homebrew_cask:
        name: hammerspoon
        state: present

    - name: Create Hammerspoon config directory
      file:
        path: "{{ user_home }}/.hammerspoon"
        state: directory

    - name: Symlink Hammerspoon config
      file:
        src: "{{ dotfiles_dir }}/config/hammerspoon/init.lua"
        dest: "{{ user_home }}/.hammerspoon/init.lua"
        state: link
        force: yes