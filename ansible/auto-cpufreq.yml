- hosts: localhost
  connection: local
  become: false
  gather_facts: true

  vars:
    auto_cpufreq_shim_deps:
      RedHat: [python3-dbus, python3-gobject]
      Archlinux: [python-dbus, python-gobject]
      Debian: [python3-dbus, python3-gi]

  pre_tasks:
    - name: Fail if running as root
      fail:
        msg: "Do not run as root"
      when: ansible_facts['user_id'] == "root"

    # guard TLP
    - name: Check if TLP is active
      command: systemctl is-active tlp
      register: _tlp_check
      changed_when: false
      failed_when: false

    - name: Fail if TLP conflicts with auto-cpufreq
      fail:
        msg: "TLP is active and conflicts with auto-cpufreq. Review its config (e.g. battery charge thresholds) then disable it: sudo systemctl disable --now tlp"
      when: _tlp_check.stdout == "active"

  tasks:
    - name: Check if auto-cpufreq is installed
      command: which auto-cpufreq
      register: _auto_cpufreq_check
      changed_when: false
      failed_when: false

    - name: Install auto-cpufreq
      shell: |
        git clone https://github.com/AdnanHodzic/auto-cpufreq.git /tmp/auto-cpufreq
        cd /tmp/auto-cpufreq
        ./auto-cpufreq-installer --install
        cd /
        rm -rf /tmp/auto-cpufreq
      become: true
      when: _auto_cpufreq_check.rc != 0

    - name: Check if auto-cpufreq daemon is enabled
      command: systemctl is-enabled auto-cpufreq
      register: _auto_cpufreq_daemon_check
      changed_when: false
      failed_when: false

    - name: Install and enable auto-cpufreq daemon
      command: auto-cpufreq --install
      become: true
      when: _auto_cpufreq_daemon_check.rc != 0

    - name: Check if KDE Plasma is installed
      command: which kwriteconfig6
      changed_when: false
      failed_when: false
      register: _kwriteconfig6

    # tuned-ppd (Fedora's org.freedesktop.UPower.PowerProfiles provider) dies with tuned,
    # which auto-cpufreq's installer masks -- this shim restores KDE's battery-popup toggle
    - name: Install DBus bindings for PowerProfiles shim (KDE)
      package:
        name: "{{ auto_cpufreq_shim_deps[ansible_facts['os_family']] }}"
        state: present
      become: true
      when:
        - _kwriteconfig6.rc == 0
        - ansible_facts['os_family'] in auto_cpufreq_shim_deps

    - name: Deploy PowerProfiles shim script (KDE)
      copy:
        src: auto-cpufreq-ppd-shim/auto-cpufreq-ppd-shim.py
        dest: /usr/local/bin/auto-cpufreq-ppd-shim
        mode: "0755"
      become: true
      when: _kwriteconfig6.rc == 0

    - name: Deploy PowerProfiles shim systemd unit (KDE)
      copy:
        src: auto-cpufreq-ppd-shim/auto-cpufreq-ppd-shim.service
        dest: /etc/systemd/system/auto-cpufreq-ppd-shim.service
        mode: "0644"
      become: true
      when: _kwriteconfig6.rc == 0

    - name: Enable and start PowerProfiles shim (KDE)
      systemd:
        name: auto-cpufreq-ppd-shim
        daemon_reload: true
        enabled: true
        state: started
      become: true
      when: _kwriteconfig6.rc == 0
