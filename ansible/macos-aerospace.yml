- hosts: localhost
  connection: local
  vars:
    dotfiles_dir: "{{ playbook_dir | dirname }}"
    user_home: "{{ lookup('env', 'HOME') }}"
    alt_tab_install_dir: /Applications/AltTab.app

  tasks:
    - name: Tap nikitabobko/tap for aerospace
      community.general.homebrew_tap:
        name: nikitabobko/tap
        state: present

    - name: Install aerospace
      community.general.homebrew_cask:
        name: nikitabobko/tap/aerospace
        state: present

    - name: Install rectangle (window snapping)
      community.general.homebrew_cask:
        name: rectangle
        state: present

    - name: Create required directories
      file:
        path: "{{ user_home }}/.config/aerospace"
        state: directory

    - name: Symlink aerospace config
      file:
        src: "{{ dotfiles_dir }}/config/aerospace/aerospace.toml"
        dest: "{{ user_home }}/.config/aerospace/aerospace.toml"
        state: link
        force: yes

    - name: Get latest AltTab fork release
      uri:
        url: https://api.github.com/repos/kevinjin420/alt-tab-macos/releases/latest
        headers:
          Accept: application/vnd.github+json
      register: alttab_latest

    - name: Get installed AltTab fork version
      slurp:
        src: /Applications/AltTab.app/.fork-release
      register: alttab_installed
      failed_when: false

    - name: AltTab fork version check
      debug:
        msg: >-
          latest={{ alttab_latest.json.tag_name }}
          installed={{ alttab_installed.content | default('') | b64decode | trim | default('not installed') }}
          action={{ 'will install/upgrade' if (alttab_installed.content is not defined or alttab_latest.json.tag_name not in (alttab_installed.content | b64decode)) else 'already up to date' }}

    - name: Download and install AltTab fork
      when: >
        alttab_installed.content is not defined or
        alttab_latest.json.tag_name not in (alttab_installed.content | b64decode)
      block:
        - name: Download AltTab.zip
          get_url:
            url: "{{ (alttab_latest.json.assets | selectattr('name', 'equalto', 'AltTab.zip') | first).browser_download_url }}"
            dest: /tmp/AltTab.zip
            force: true

        - name: Remove existing AltTab.app
          file:
            path: /Applications/AltTab.app
            state: absent
          become: true

        - name: Unzip AltTab.app
          unarchive:
            src: /tmp/AltTab.zip
            dest: /Applications/
            remote_src: true
          become: true

        - name: Strip quarantine attribute
          command: xattr -dr com.apple.quarantine /Applications/AltTab.app
          become: true
          failed_when: false

        - name: Record installed version
          copy:
            content: "{{ alttab_latest.json.tag_name }}"
            dest: /Applications/AltTab.app/.fork-release
          become: true

        - name: Clean up download
          file:
            path: /tmp/AltTab.zip
            state: absent
