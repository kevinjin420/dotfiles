# Approach: aerospace for workspace switching + window movement,
#           XOR-op/alt-tab-macos fork for per-workspace alt-tab.
#
# Achieves:
#   [x] alt-#         — switch to workspace (aerospace)
#   [x] alt-shift-#   — move window to workspace (aerospace)
#   [x] alt-tab current workspace only — via XOR-op's fork of alt-tab
#       Mechanism: aerospace hides off-workspace windows by moving them
#       off-screen at tiny dimensions; the fork filters those out.
#       Source: https://github.com/XOR-op/alt-tab-macos (7.38.1-aerospace)
#       No pre-built releases — must build from source. Requires Xcode.

- hosts: localhost
  connection: local
  vars:
    dotfiles_dir: "{{ playbook_dir | dirname }}"
    user_home: "{{ lookup('env', 'HOME') }}"
    alt_tab_fork_dir: /tmp/alt-tab-macos-fork

  tasks:
    - name: Tap nikitabobko/tap for aerospace
      community.general.homebrew_tap:
        name: nikitabobko/tap
        state: present

    - name: Install aerospace
      community.general.homebrew_cask:
        name: nikitabobko/tap/aerospace
        state: present

    - name: Create required directories
      file:
        path: "{{ user_home }}/.config/aerospace"
        state: directory

    - name: Symlink aerospace config
      file:
        src: "{{ dotfiles_dir }}/config/aerospace/aerospace.toml"
        dest: "{{ user_home }}/.config/aerospace/aerospace.toml"
        state: link
        force: yes
