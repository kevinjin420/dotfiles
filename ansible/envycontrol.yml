- hosts: localhost
  connection: local
  become: false
  gather_facts: true

  pre_tasks:
    - name: Fail if running as root
      fail:
        msg: "Do not run as root"
      when: ansible_facts['user_id'] == "root"

    - name: Fail if unsupported distro
      fail:
        msg: "envycontrol setup only covers Fedora and Arch -- Debian/Ubuntu already ship prime-select"
      when: ansible_facts['distribution'] not in ['Fedora', 'Archlinux']

    - name: Check if yay is available (Arch)
      command: which yay
      register: _yay_check
      changed_when: false
      failed_when: false
      when: ansible_facts['distribution'] == 'Archlinux'

    - name: Fail if yay missing (Arch)
      fail:
        msg: "yay not found -- run software.yml first to bootstrap the AUR helper"
      when: ansible_facts['distribution'] == 'Archlinux' and _yay_check.rc != 0

  tasks:
    - name: Enable envycontrol COPR repo (Fedora)
      community.general.copr:
        name: sunwire/envycontrol
        state: enabled
      become: true
      when: ansible_facts['distribution'] == 'Fedora'

    - name: Install envycontrol (Fedora)
      ansible.builtin.dnf:
        name: python3-envycontrol
        state: present
      become: true
      when: ansible_facts['distribution'] == 'Fedora'

    - name: Install envycontrol (Arch)
      shell: yay -S --noconfirm --needed envycontrol
      changed_when: false
      when: ansible_facts['distribution'] == 'Archlinux'

    - name: Check if KDE Plasma is installed
      command: which kwriteconfig6
      changed_when: false
      failed_when: false
      register: _kwriteconfig6

    - name: Install optimus-gpu-switcher plasmoid (Arch)
      shell: yay -S --noconfirm --needed plasma6-applets-optimus-gpu-switcher-git
      changed_when: false
      when: ansible_facts['distribution'] == 'Archlinux' and _kwriteconfig6.rc == 0

    # no fedora package available, github releases ships plasma 5 widget, cant use
    - name: Create scratch dir for optimus-gpu-switcher source (Fedora)
      file:
        path: /tmp/optimus-gpu-switcher
        state: directory
      when: ansible_facts['distribution'] == 'Fedora' and _kwriteconfig6.rc == 0

    - name: Download optimus-gpu-switcher source (Fedora)
      unarchive:
        src: https://github.com/enielrodriguez/optimus-gpu-switcher/archive/refs/heads/main.tar.gz
        dest: /tmp/optimus-gpu-switcher
        remote_src: true
        extra_opts: ["--strip-components=1"]
      when: ansible_facts['distribution'] == 'Fedora' and _kwriteconfig6.rc == 0

    - name: Install optimus-gpu-switcher plasmoid (Fedora)
      shell: kpackagetool6 --type Plasma/Applet --install /tmp/optimus-gpu-switcher 2>/dev/null || kpackagetool6 --type Plasma/Applet --upgrade /tmp/optimus-gpu-switcher
      changed_when: false
      when: ansible_facts['distribution'] == 'Fedora' and _kwriteconfig6.rc == 0
