- hosts: localhost
  connection: local
  vars:
    dotfiles_dir: "{{ playbook_dir | dirname }}"
    user_home: "{{ lookup('env', 'HOME') }}"
  # Moved away from karabiner + aerospace; sudo prompt no longer needed.
  # vars_prompt:
  #   - name: sudo_password
  #     prompt: "Enter sudo password (required for karabiner-elements .pkg install)"
  #     private: yes

  tasks:
    # Moved away from aerospace (using rectangle instead).
    # - name: Tap nikitabobko/tap for aerospace
    #   community.general.homebrew_tap:
    #     name: nikitabobko/tap
    #     state: present
    #
    # - name: Install aerospace (no sudo)
    #   community.general.homebrew_cask:
    #     name: nikitabobko/tap/aerospace
    #     state: present

    # Moved away from karabiner-elements.
    # - name: Install karabiner-elements (sudo)
    #   community.general.homebrew_cask:
    #     name: karabiner-elements
    #     state: present
    #     sudo_password: "{{ sudo_password }}"

    # - name: Create required directories
    #   file:
    #     path: "{{ item }}"
    #     state: directory
    #   loop:
    #     - "{{ user_home }}/.config/aerospace"
    #     - "{{ user_home }}/.config/karabiner"

    - name: Install alt-tab
      community.general.homebrew_cask:
        name: alt-tab
        state: present

    - name: Install rectangle (window snapping)
      community.general.homebrew_cask:
        name: rectangle
        state: present

    # - name: Create symlinks for macOS dotfiles
    #   file:
    #     src: "{{ dotfiles_dir }}/{{ item.src }}"
    #     dest: "{{ user_home }}/{{ item.dest }}"
    #     state: link
    #     force: yes
    #   loop:
    #     - { src: 'config/aerospace/aerospace.toml', dest: '.config/aerospace/aerospace.toml' }
    #     - { src: 'config/karabiner/karabiner.json', dest: '.config/karabiner/karabiner.json' }

    - name: Configure AltTab preferences
      osx_defaults:
        domain: com.lwouis.alt-tab-macos
        key: "{{ item.key }}"
        type: string
        value: "{{ item.value }}"
      loop:
        - { key: 'appearanceStyle',        value: '2' }
        - { key: 'appearanceTheme',        value: '2' }
        - { key: 'previewFadeInAnimation', value: 'false' }
        - { key: 'windowDisplayDelay',     value: '0' }
        - { key: 'updatePolicy',           value: '1' }
