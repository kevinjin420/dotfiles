- hosts: localhost
  connection: local
  vars:
    dotfiles_dir: "{{ playbook_dir | dirname }}"
    user_home: "{{ lookup('env', 'HOME') }}"

  tasks:
    - name: Tap jurplel/tap for instant-space-switcher
      community.general.homebrew_tap:
        name: jurplel/tap
        state: present

    - name: Install instant-space-switcher
      community.general.homebrew_cask:
        name: jurplel/tap/instant-space-switcher
        state: present

    - name: Install rectangle (window snapping)
      community.general.homebrew_cask:
        name: rectangle
        state: present
